<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Meca Champs 2 - Torneo de fútbol oficial. Tablas, fixture, estadísticas y más.">
  <title>MECA CHAMPS 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== NAVIGATION ===== -->
  <nav id="main-nav">
    <div class="nav-logo" onclick="navigate('home')">
      <div class="logo-icon">⚙</div>
      <div class="logo-text">
        <span class="logo-main">MECA CHAMPS</span>
        <span class="logo-sub">SEASON II</span>
      </div>
    </div>

    <div id="nav-links">
      <a href="#" class="nav-link" data-view="home">INICIO</a>
      <a href="#" class="nav-link" data-view="primera">1RA DIV</a>
      <a href="#" class="nav-link" data-view="segunda">2DA DIV</a>
      <a href="#" class="nav-link" data-view="copa">COPA MC2</a>
      <a href="#" class="nav-link" data-view="equipos">EQUIPOS</a>
    </div>

    <div class="nav-admin">
      <button id="admin-btn" class="btn-admin" onclick="toggleAdmin()">⚡ ADMIN</button>
    </div>

    <button class="nav-toggle" onclick="toggleMobileNav()" aria-label="Menú">☰</button>
  </nav>

  <!-- ===== MAIN CONTENT ===== -->
  <main id="main-content">
    <div class="empty-state" style="margin-top:4rem">
      <div style="font-family:'Orbitron',sans-serif;font-size:2rem;color:var(--cyan);margin-bottom:1rem">⚙</div>
      Cargando Meca Champs 2...
    </div>
  </main>

  <!-- ===== ADMIN PANEL ===== -->
  <div id="admin-overlay" class="hidden">
    <div id="admin-panel"></div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>

  <script>
    // Mobile nav toggle
    function toggleMobileNav() {
      document.getElementById('nav-links').classList.toggle('open');
    }

    // Close nav when clicking outside
    document.addEventListener('click', e => {
      const nav = document.getElementById('nav-links');
      const toggle = document.querySelector('.nav-toggle');
      if (nav && toggle && !nav.contains(e.target) && !toggle.contains(e.target)) {
        nav.classList.remove('open');
      }
    });

    // Close admin panel on escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        const overlay = document.getElementById('admin-overlay');
        if (overlay && !overlay.classList.contains('hidden')) {
          closeAdminPanel();
        }
        const newsModal = document.getElementById('news-modal');
        if (newsModal && !newsModal.classList.contains('hidden')) {
          closeNewsModal();
        }
      }
    });
  </script>
</body>
</html>
